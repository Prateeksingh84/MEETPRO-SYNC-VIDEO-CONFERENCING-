services:
  backend:
    build: ./backend
    container_name: zoomly-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./data/zoom_clone.db
      FRONTEND_ORIGIN: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - backend_data:/app/data

  frontend:
    build: ./frontend
    container_name: zoomly-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_data:
